<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudySpace · Math Resources</title>
    <link rel="stylesheet" href="math-resources.css" />
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-brand">
                <span class="brand-icon">📘</span> StudySpace
            </a>
            <button class="nav-toggle" onclick="toggleNav()">☰</button>
            <div class="nav-links" id="navLinks">
                <a href="index.html#resources">Resources</a>
                <a href="index.html#events">Events</a>
                <a href="index.html#about">About</a>
                <a href="dashboard.html">Dashboard</a>
            </div>
            <div class="nav-actions">
                <span style="font-size:0.8rem;color:var(--text-secondary);margin-right:8px;">👤 Tutor</span>
                <a href="index.html" class="btn btn-outline">Log Out</a>
            </div>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>📐 Mathematics Resources</h1>
            <p>Explore and share study materials for Algebra, Calculus, Statistics, and more.</p>
        </div>
    </section>

    <!-- Post Resource Section -->
    <section class="post-section" id="postSection">
        <div class="container">
            <div class="card">
                <div class="card-header">
                    <h2>📤 Post a Resource</h2>
                    <span class="badge">Tutor only</span>
                </div>
                <div class="post-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="resourceTitle">Resource Title</label>
                            <input type="text" id="resourceTitle" placeholder="e.g. Calculus Practice Problems" />
                        </div>
                        <div class="form-group">
                            <label for="resourceTopic">Topic</label>
                            <select id="resourceTopic">
                                <option value="Algebra">Algebra</option>
                                <option value="Calculus">Calculus</option>
                                <option value="Statistics">Statistics</option>
                                <option value="Geometry">Geometry</option>
                                <option value="Trigonometry">Trigonometry</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="resourceDesc">Description / Content</label>
                        <textarea id="resourceDesc" rows="3" placeholder="Describe the resource or paste content..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="resourceLink">Link (optional)</label>
                            <input type="text" id="resourceLink" placeholder="https://example.com/resource" />
                        </div>
                        <div class="form-group" style="display:flex;align-items:flex-end;">
                            <button class="btn btn-primary" onclick="postResource()">📤 Post Resource</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Resources List -->
    <section class="resources-list">
        <div class="container">
            <div class="section-header">
                <h2>📚 Available Resources</h2>
                <span class="badge" id="resourceCount">0 resources</span>
            </div>
            <div id="resourceContainer">
                <!-- Resources loaded from localStorage -->
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container"><p>&copy; 2026 <a href="index.html">StudySpace</a>. All rights reserved.</p></div>
    </footer>

    <script>
        // ================================================================
        // DATA
        // ================================================================
        let resources = [];

        // ================================================================
        // LOAD & RENDER RESOURCES
        // ================================================================
        function loadResources() {
            try {
                const saved = localStorage.getItem('mathResources');
                if (saved) {
                    resources = JSON.parse(saved);
                } else {
                    // Seed with sample resources
                    resources = [
                        { id: 1, title: 'Calculus Practice Problems', topic: 'Calculus', desc: 'A set of 50 practice problems with solutions for Calculus I.', link: '', date: '2026-10-10', postedBy: 'Jane Doe' },
                        { id: 2, title: 'Algebra Cheat Sheet', topic: 'Algebra', desc: 'Quick reference sheet for algebraic formulas and rules.', link: '', date: '2026-10-08', postedBy: 'Jane Doe' },
                        { id: 3, title: 'Statistics Formula Guide', topic: 'Statistics', desc: 'Comprehensive guide to all major statistical formulas.', link: '', date: '2026-10-05', postedBy: 'Jane Doe' }
                    ];
                    localStorage.setItem('mathResources', JSON.stringify(resources));
                }
            } catch(e) { resources = []; }
            renderResources();
        }

        function renderResources() {
            const container = document.getElementById('resourceContainer');
            const count = document.getElementById('resourceCount');

            if (!resources.length) {
                container.innerHTML = '<p class="text-muted" style="text-align:center;padding:40px 0;">No resources posted yet. Be the first to share! 📚</p>';
                count.textContent = '0 resources';
                return;
            }

            let html = '';
            resources.forEach(r => {
                html += `
                    <div class="resource-item card">
                        <div class="resource-header">
                            <div>
                                <h3>${r.title}</h3>
                                <span class="topic-tag">${r.topic}</span>
                            </div>
                            <div class="resource-meta">
                                <span class="posted-by">👤 ${r.postedBy || 'Tutor'}</span>
                                <span class="posted-date">${r.date}</span>
                                <button class="btn btn-sm btn-danger" onclick="deleteResource(${r.id})" style="margin-left:8px;">🗑️ Delete</button>
                            </div>
                        </div>
                        <p class="resource-desc">${r.desc}</p>
                        ${r.link ? `<a href="${r.link}" target="_blank" class="resource-link">🔗 View Resource</a>` : ''}
                    </div>
                `;
            });

            container.innerHTML = html;
            count.textContent = resources.length + ' resources';
        }

        // ================================================================
        // POST RESOURCE
        // ================================================================
        function postResource() {
            const title = document.getElementById('resourceTitle').value.trim();
            const topic = document.getElementById('resourceTopic').value;
            const desc = document.getElementById('resourceDesc').value.trim();
            const link = document.getElementById('resourceLink').value.trim();

            if (!title) return alert('Please enter a title.');
            if (!desc) return alert('Please enter a description.');

            const newResource = {
                id: Date.now(),
                title,
                topic,
                desc,
                link,
                date: new Date().toISOString().split('T')[0],
                postedBy: 'Jane Doe (Tutor)'
            };

            resources.unshift(newResource);
            localStorage.setItem('mathResources', JSON.stringify(resources));
            renderResources();

            document.getElementById('resourceTitle').value = '';
            document.getElementById('resourceDesc').value = '';
            document.getElementById('resourceLink').value = '';
            showToast('✅ Resource posted successfully!');
        }

        // ================================================================
        // DELETE RESOURCE
        // ================================================================
        function deleteResource(id) {
            if (!confirm('Are you sure you want to delete this resource?')) return;

            resources = resources.filter(r => r.id !== id);
            localStorage.setItem('mathResources', JSON.stringify(resources));
            renderResources();
            showToast('🗑️ Resource deleted successfully!');
        }

        // ================================================================
        // TOAST NOTIFICATION
        // ================================================================
        function showToast(msg) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.className = 'toast';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._t);
            toast._t = setTimeout(() => toast.classList.remove('show'), 2600);
        }

        // ================================================================
        // NAV TOGGLE (mobile)
        // ================================================================
        function toggleNav() {
            document.getElementById('navLinks').classList.toggle('open');
        }

        // ================================================================
        // INIT
        // ================================================================
        loadResources();

        // Expose functions to global scope
        window.postResource = postResource;
        window.deleteResource = deleteResource;
        window.toggleNav = toggleNav;
    </script>

</body>
</html>
